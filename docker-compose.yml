services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PAYLOAD_SECRET: build-placeholder-secret-not-real
        DATABASE_URI: mongodb://placeholder:placeholder@127.0.0.1:27017/placeholder?authSource=admin
    restart: unless-stopped
    container_name: agency-abect-frontend
    env_file:
      - ../.env.db
      - ../.env.frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3333:3000"
    volumes:
      - ./media:/app/media
    networks:
      - abect-shared
      - mongodb-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  abect-shared:
    external: true
    name: abect-shared
  mongodb-net:
    external: true
    name: mongodb-net